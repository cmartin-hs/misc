  .filter-btn { background: #1a1a2e; border: 1px solid #333; color: #aaa; padding: 4px 13px; border-radius: 20px; cursor: pointer; font-size: 0.73em; letter-spacing: 1px; transition: all 0.2s; }

  .count-label { text-align: center; font-size: 0.72em; color: #555; margin-bottom: 16px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 18px; max-width: 1400px; margin: 0 auto; }
  .card { background: #111120; border-radius: 12px; border: 1px solid #2a2a3e; overflow: hidden; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }

  .faction-name { font-size: 0.93em; font-weight: bold; color: #f0e8d0; }

  .src-te   { background: #2a2a1a; color: #ffdd7a; border: 1px solid #5a5a2a; }
  .commander-name { font-size: 0.7em; color: #888; margin-top: 2px; font-style: italic; }
  .mana-symbols { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 7px; }
  .pip { width: 21px; height: 21px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.68em; font-weight: bold; flex-shrink: 0; }
  .pip-W { background: #f8f6e8; color: #333; }
  .pip-U { background: #0e68ab; color: #fff; }
  .pip-B { background: #2a2a2a; color: #c9a84c; border: 1px solid #555; }
  .pip-R { background: #d3202a; color: #fff; }
  .pip-G { background: #00733e; color: #fff; }
  .archetype-badge { display: inline-block; background: #1e180a; border: 1px solid #5a4a1a; color: #c9a84c; font-size: 0.62em; padding: 2px 8px; border-radius: 10px; margin-top: 6px; }
  .expand-hint { font-size: 0.6em; color: #444; margin-top: 5px; }
  .card.expanded .expand-hint { display: none; }
  .card-body { padding: 0 15px 13px; display: none; }

  .section-label { font-size: 0.63em; text-transform: uppercase; letter-spacing: 2px; color: #c9a84c; margin: 10px 0 4px; }
  .flavor-text { font-style: italic; font-size: 0.73em; color: #aaa; border-left: 2px solid #333; padding-left: 10px; margin-bottom: 7px; line-height: 1.5; }
  .mechanics { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 6px; }

  .ability-box { background: #0d0d1a; border: 1px solid #2a2a3e; border-radius: 8px; padding: 10px; font-size: 0.71em; line-height: 1.65; color: #ccc; }

  .flip-label { font-size: 0.63em; text-transform: uppercase; letter-spacing: 2px; color: #e090e0; margin: 10px 0 4px; }
  .flip-box { background: #1a0d1a; border: 1px solid #5a2a5a; border-radius: 8px; padding: 10px; font-size: 0.71em; line-height: 1.65; color: #e0c8e0; }

  .stats-row { display: flex; gap: 8px; margin-top: 8px; font-size: 0.68em; color: #888; flex-wrap: wrap; }
  .stat { background: #1a1a2e; padding: 2px 7px; border-radius: 6px; }
  .divider { height: 1px; background: #1e1e2e; margin: 7px 0; }

let activeColor='all', activeSrc='all';

function setColor(c,btn){ activeColor=c; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); render(); }
function setSource(s,btn){ activeSrc=s; document.querySelectorAll('.source-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); render(); }
function toggle(i){ document.querySelector(`[data-idx="${i}"]`).classList.toggle('expanded'); }

const srcL={base:'🎮 Base',pok:'🌌 PoK',codex:'📜 Codex',te:'⚡ TE'};
const srcC={base:'src-base',pok:'src-pok',codex:'src-codex',te:'src-te'};

function render(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  let count=0;
  F.forEach((f,i)=>{
    if(activeColor!=='all' && !f.colors.includes(activeColor)) return;
    if(activeSrc!=='all' && f.src!==activeSrc) return;
    count++;
    const card=document.createElement('div');
    card.className='card'; card.dataset.idx=i; card.onclick=()=>toggle(i);
    const pips=f.colors.map(c=>`<div class="pip pip-${c}">${c}</div>`).join('');
    const tags=f.mec.map(m=>`<span class="mechanic-tag">${m}</span>`).join('');
    const flipHtml=f.flip?`<div class="flip-label">🔄 Cara B — The Obsidian (tras volteo)</div><div class="flip-box">${f.flip}</div>`:'';
    card.innerHTML=`
      <div class="card-header">
        <div class="color-bar" style="background:${f.bar}"></div>
        <div class="top-row">
          <div class="faction-name">${f.name}</div>
          <span class="src-badge ${srcC[f.src]}">${srcL[f.src]}</span>
        </div>
        <div class="commander-name">${f.cmd}</div>
        <div class="mana-symbols">${pips}</div>
        <div class="archetype-badge">⚔ ${f.arch}</div>
        <div class="expand-hint">▼ click para expandir</div>
      </div>
      <div class="card-body">
        <div class="divider"></div>
        <div class="section-label">🌌 Identidad de color</div>
        <div style="font-size:0.73em;color:#aaa;margin-bottom:6px">${f.ci}</div>
        <div class="section-label">📖 Flavor</div>
        <div class="flavor-text">${f.flav}</div>
        <div class="section-label">⚙ Mecánicas</div>
        <div class="mechanics">${tags}</div>
        <div class="section-label">✨ Habilidades de lealtad</div>
        <div class="ability-box">${f.abi}</div>
        ${flipHtml}
        <div class="stats-row">
          <span class="stat">P/T ${f.pt}</span>
          <span class="stat">Loyalty ${f.loy}</span>
          <span class="stat">Legendary Planeswalker</span>
        </div>
      </div>`;
    grid.appendChild(card);
  });
  document.getElementById('countLabel').textContent=`Mostrando ${count} de 30 facciones`;
}
render();
</script>
