<!DOCTYPE html>
<html>
<head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', serif;
    background: #0a0a1a;
    color: #e8e0d0;
    padding: 24px;
    min-height: 100vh;
  }
  h1 {
    text-align: center;
    font-size: 1.4em;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #c9a84c;
    margin-bottom: 6px;
  }
  .subtitle {
    text-align: center;
    font-size: 0.78em;
    color: #888;
    margin-bottom: 28px;
    letter-spacing: 1px;
  }
  .filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 28px;
  }
  .filter-btn {
    background: #1a1a2e;
    border: 1px solid #333;
    color: #aaa;
    padding: 5px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.75em;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: #c9a84c;
    color: #c9a84c;
    background: #1e1a0e;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .card {
    background: #111120;
    border-radius: 12px;
    border: 1px solid #2a2a3e;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
    position: relative;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  }
  .card-header {
    padding: 14px 16px 10px;
    position: relative;
  }
  .color-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    border-radius: 12px 12px 0 0;
  }
  .faction-name {
    font-size: 1em;
    font-weight: bold;
    color: #f0e8d0;
    letter-spacing: 0.5px;
    margin-top: 4px;
  }
  .commander-name {
    font-size: 0.72em;
    color: #888;
    margin-top: 2px;
    font-style: italic;
  }
  .mana-symbols {
    display: flex;
    gap: 5px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .pip {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7em;
    font-weight: bold;
    color: #000;
    flex-shrink: 0;
  }
  .pip-W { background: #f8f6e8; color: #333; }
  .pip-U { background: #0e68ab; color: #fff; }
  .pip-B { background: #2a2a2a; color: #c9a84c; border: 1px solid #555; }
  .pip-R { background: #d3202a; color: #fff; }
  .pip-G { background: #00733e; color: #fff; }
  .pip-C { background: #9b9b9b; color: #fff; }
  .card-body {
    padding: 0 16px 14px;
    display: none;
  }
  .card.expanded .card-body {
    display: block;
  }
  .section-label {
    font-size: 0.65em;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #c9a84c;
    margin: 10px 0 5px;
  }
  .flavor-text {
    font-style: italic;
    font-size: 0.75em;
    color: #aaa;
    border-left: 2px solid #333;
    padding-left: 10px;
    margin-bottom: 8px;
    line-height: 1.5;
  }
  .mechanics {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 6px;
  }
  .mechanic-tag {
    background: #1e1a2e;
    border: 1px solid #3a3a5e;
    border-radius: 10px;
    padding: 2px 9px;
    font-size: 0.68em;
    color: #b0a8c8;
    letter-spacing: 0.5px;
  }
  .ability-box {
    background: #0d0d1a;
    border: 1px solid #2a2a3e;
    border-radius: 8px;
    padding: 10px;
    font-size: 0.73em;
    line-height: 1.6;
    color: #ccc;
  }
  .ability-box b { color: #c9a84c; }
  .stats-row {
    display: flex;
    gap: 10px;
    margin-top: 8px;
    font-size: 0.7em;
    color: #888;
  }
  .stat { background: #1a1a2e; padding: 3px 8px; border-radius: 6px; }
  .expand-hint {
    position: absolute;
    bottom: 8px;
    right: 12px;
    font-size: 0.65em;
    color: #555;
    letter-spacing: 1px;
  }
  .card.expanded .expand-hint { display: none; }
  .color-identity-label {
    font-size: 0.68em;
    color: #777;
    margin-top: 6px;
  }
  .archetype-badge {
    display: inline-block;
    background: #1e180a;
    border: 1px solid #5a4a1a;
    color: #c9a84c;
    font-size: 0.65em;
    padding: 2px 9px;
    border-radius: 10px;
    margin-top: 6px;
    letter-spacing: 0.5px;
  }
  .divider { height: 1px; background: #1e1e2e; margin: 8px 0; }
</style>
</head>

let activeFilter = 'all';

function filterCards(color, btn) {
  activeFilter = color;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function toggleCard(idx) {
  const card = document.querySelector(`[data-idx="${idx}"]`);
  card.classList.toggle('expanded');
}

function renderCards() {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  factions.forEach((f, i) => {
    if (activeFilter !== 'all' && !f.colors.includes(activeFilter)) return;
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.idx = i;
    card.onclick = () => toggleCard(i);
    
    const pips = f.colors.map(c => `<div class="pip pip-${c}">${c}</div>`).join('');
    const tags = f.mechanics.map(m => `<span class="mechanic-tag">${m}</span>`).join('');
    
    card.innerHTML = `
      <div class="card-header">
        <div class="color-bar" style="background: ${f.colorBar}"></div>
        <div class="faction-name">${f.name}</div>
        <div class="commander-name">${f.commander}</div>
        <div class="mana-symbols">${pips}</div>
        <div class="archetype-badge">⚔ ${f.archetype}</div>
        <div class="expand-hint">▼ expandir</div>
      </div>
      <div class="card-body">
        <div class="divider"></div>
        <div class="section-label">🌌 Identidad de color</div>
        <div style="font-size:0.75em; color:#aaa; margin-bottom:6px">${f.colorIdentity}</div>
        <div class="section-label">📖 Flavor</div>
        <div class="flavor-text">${f.flavor}</div>
        <div class="section-label">⚙ Mecánicas principales</div>
        <div class="mechanics">${tags}</div>
        <div class="section-label">✨ Texto de habilidades</div>
        <div class="ability-box">${f.ability}</div>
        <div class="stats-row">
          <span class="stat">P/T ${f.power}/${f.toughness}</span>
          <span class="stat">Loyalty ${f.loyalty}</span>
          <span class="stat">Legendary Planeswalker</span>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

renderCards();
</script>
